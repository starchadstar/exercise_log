<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Log – Chad & Brie</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5F0E8;
    --paper: #FAF7F2;
    --ink: #2C2416;
    --ink-light: #7A6A54;
    --ink-faint: #C4B49A;
    --chad: #6B8F5E;
    --chad-bg: #EBF2E7;
    --brie: #B07D4A;
    --brie-bg: #F5EBE0;
    --gold: #C9A84C;
    --gold-bg: #F5EDD6;
    --month-header: #3A2E1E;
    --border: #DDD5C4;
    --shadow: rgba(60,40,10,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(139,115,85,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 100%, rgba(107,143,94,0.06) 0%, transparent 60%);
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── GATE ── */
  #gate {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 9999; flex-direction: column; gap: 1.5rem;
  }
  .gate-box {
    background: var(--paper); border: 1px solid var(--border);
    border-radius: 16px; padding: 2.5rem; width: 320px;
    display: flex; flex-direction: column; gap: 1rem;
    box-shadow: 0 8px 32px var(--shadow);
  }
  .gate-input {
    padding: 0.7rem 1rem; border: 1.5px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif;
    font-size: 1rem; background: var(--bg); color: var(--ink);
    outline: none; letter-spacing: 0.15em;
  }
  .gate-input:focus { border-color: var(--chad); }
  .gate-btn {
    padding: 0.7rem; border: none; border-radius: 8px;
    background: var(--month-header); color: white;
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .gate-btn:hover { background: var(--chad); }
  .gate-error { font-size: 0.78rem; color: #c0392b; text-align: center; min-height: 1rem; }

  /* ── HEADER ── */
  header {
    padding: 1.5rem 2.5rem 1rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 1rem; background: var(--paper);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .title-block h1 { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; color: var(--month-header); letter-spacing: -0.02em; line-height: 1; }
  .title-block p { font-size: 0.75rem; color: var(--ink-light); font-weight: 300; margin-top: 0.25rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; }
  .legend { display: flex; gap: 1.2rem; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.75rem; font-weight: 500; color: var(--ink-light); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }
  .dot-chad { background: var(--chad); }
  .dot-brie { background: var(--brie); }
  .dot-both { background: var(--gold); }

  /* View switcher */
  .view-switcher { display: flex; gap: 0; border: 1.5px solid var(--border); border-radius: 8px; overflow: hidden; }
  .view-btn {
    padding: 0.35rem 0.85rem; border: none; background: none;
    font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600;
    color: var(--ink-light); cursor: pointer; transition: all 0.15s;
    border-right: 1px solid var(--border);
  }
  .view-btn:last-child { border-right: none; }
  .view-btn.active { background: var(--month-header); color: white; }
  .view-btn:hover:not(.active) { background: var(--chad-bg); color: var(--chad); }

  .nav { display: flex; align-items: center; gap: 0.75rem; }
  .nav-btn {
    background: none; border: 1.5px solid var(--border);
    width: 32px; height: 32px; border-radius: 8px;
    cursor: pointer; font-size: 1rem; color: var(--ink-light);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--chad); color: var(--chad); background: var(--chad-bg); }
  .nav-label { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 500; color: var(--ink); min-width: 160px; text-align: center; }
  .sync-label { font-size: 0.68rem; color: var(--ink-light); display: flex; align-items: center; gap: 0.4rem; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-faint); display: inline-block; transition: background 0.3s; }
  .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.synced { background: var(--chad); }
  .sync-dot.error { background: #c0392b; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }

  /* ── MAIN ── */
  main { padding: 1.5rem 2.5rem 4rem; max-width: 1500px; margin: 0 auto; }

  /* ── MONTH VIEW ── */
  .calendar-grid {
    background: var(--paper); border-radius: 16px;
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .dow-row { display: grid; grid-template-columns: repeat(7,1fr); background: var(--month-header); }
  .dow-cell { padding: 0.55rem 0; text-align: center; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.7); }
  .week-row { display: grid; grid-template-columns: repeat(7,1fr); border-bottom: 1px solid var(--border); }
  .week-row:last-child { border-bottom: none; }

  .day-cell {
    min-height: 120px; padding: 0.5rem 0.45rem;
    border-right: 1px solid var(--border);
    transition: background 0.15s, filter 0.15s;
  }
  .day-cell:last-child { border-right: none; }
  .day-cell.other-month { opacity: 0.3; pointer-events: none; }
  .day-cell.weekend { background: rgba(0,0,0,0.012); }
  .day-cell.shade-chad { background: var(--chad-bg); }
  .day-cell.shade-brie { background: var(--brie-bg); }
  .day-cell.shade-both { background: var(--gold-bg); }
  .day-cell:hover:not(.other-month) { cursor: pointer; filter: brightness(0.95); }
  .day-num {
    font-size: 0.72rem; font-weight: 600; color: var(--ink-light);
    margin-bottom: 0.35rem; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .day-cell.today .day-num {
    background: var(--month-header); color: white;
    border-radius: 50%; font-weight: 700;
  }
  .workouts-grid { display: flex; flex-direction: column; gap: 2px; }
  .workout-row { display: flex; gap: 3px; align-items: center; }
  .workout-name-label {
    font-size: 0.5rem; font-weight: 600; letter-spacing: 0.03em;
    color: var(--ink-faint); text-transform: uppercase;
    width: 38px; flex-shrink: 0; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .workout-pip {
    width: 15px; height: 15px; border-radius: 3px;
    border: 1.5px solid var(--border); cursor: pointer;
    transition: all 0.12s; flex-shrink: 0; position: relative;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.48rem; font-weight: 700; color: var(--ink-faint);
    font-family: 'DM Sans', sans-serif;
  }
  .workout-pip:hover { border-color: var(--ink-faint); transform: scale(1.12); }
  .workout-pip.chad-done { background: var(--chad); border-color: var(--chad); color: white; }
  .workout-pip.brie-done { background: var(--brie); border-color: var(--brie); color: white; }
  .workout-pip[data-tooltip]:hover::before {
    content: attr(data-tooltip);
    position: absolute; bottom: calc(100% + 4px); left: 50%;
    transform: translateX(-50%);
    background: var(--month-header); color: white;
    font-size: 0.62rem; padding: 2px 6px; border-radius: 4px;
    white-space: nowrap; z-index: 999; pointer-events: none;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── WEEK VIEW ── */
  #weekView { display: none; }
  .week-view-grid {
    background: var(--paper); border-radius: 16px;
    border: 1px solid var(--border); overflow: hidden;
    box-shadow: 0 4px 24px var(--shadow);
  }
  .week-view-header {
    display: grid; grid-template-columns: 90px repeat(7, 1fr);
    background: var(--month-header);
  }
  .week-view-header-cell {
    padding: 0.7rem 0.5rem; text-align: center;
    font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: rgba(255,255,255,0.8);
    border-right: 1px solid rgba(255,255,255,0.1);
  }
  .week-view-header-cell:first-child { color: rgba(255,255,255,0.4); }
  .week-view-header-cell.today-col { color: white; background: rgba(255,255,255,0.12); }
  .week-view-row {
    display: grid; grid-template-columns: 90px repeat(7, 1fr);
    border-bottom: 1px solid var(--border);
  }
  .week-view-row:last-child { border-bottom: none; }
  .week-workout-label {
    padding: 0.6rem 0.75rem; font-size: 0.72rem; font-weight: 600;
    color: var(--ink-light); text-transform: uppercase; letter-spacing: 0.05em;
    background: var(--bg); border-right: 1px solid var(--border);
    display: flex; align-items: center;
  }
  .week-day-cell {
    padding: 0.5rem; border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 4px;
    align-items: center; justify-content: center;
    min-height: 54px; transition: background 0.15s;
    cursor: pointer;
  }
  .week-day-cell:last-child { border-right: none; }
  .week-day-cell:hover { background: var(--chad-bg); }
  .week-day-cell.today-col { background: rgba(58,46,30,0.04); }
  .week-pip {
    width: 28px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem; font-weight: 700; color: var(--ink-faint);
    cursor: pointer; transition: all 0.12s; font-family: 'DM Sans', sans-serif;
  }
  .week-pip:hover { transform: scale(1.08); }
  .week-pip.chad-done { background: var(--chad); border-color: var(--chad); color: white; }
  .week-pip.brie-done { background: var(--brie); border-color: var(--brie); color: white; }
  .week-pip-label { font-size: 0.52rem; color: var(--ink-faint); font-weight: 500; }

  /* ── STATS ── */
  .stats-bar {
    display: flex; gap: 1.2rem; padding: 0.9rem 2.5rem;
    background: var(--paper); border-top: 1px solid var(--border);
    flex-wrap: wrap; align-items: center;
  }
  .stat-block { text-align: center; }
  .stat-val { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 700; line-height: 1; }
  .stat-val.chad-color { color: var(--chad); }
  .stat-val.brie-color { color: var(--brie); }
  .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-light); margin-top: 2px; font-weight: 500; }
  .stat-divider { width: 1px; height: 32px; background: var(--border); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(44,36,22,0.45); z-index: 500;
    align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--paper); border-radius: 16px; padding: 2rem;
    min-width: 340px; max-width: 480px; width: 90%;
    box-shadow: 0 20px 60px rgba(44,36,22,0.3);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1} }
  .modal-date { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 700; color: var(--month-header); margin-bottom: 1.5rem; padding-bottom: 0.8rem; border-bottom: 1px solid var(--border); }
  .modal-workouts { display: flex; flex-direction: column; gap: 0.6rem; }
  .modal-workout-row { display: flex; align-items: center; justify-content: space-between; padding: 0.55rem 0.8rem; border-radius: 8px; background: var(--bg); }
  .modal-workout-name { font-size: 0.75rem; font-weight: 600; color: var(--ink); text-transform: uppercase; letter-spacing: 0.06em; }
  .modal-toggles { display: flex; gap: 0.5rem; }
  .toggle-btn {
    padding: 0.28rem 0.75rem; border-radius: 20px;
    border: 1.5px solid var(--border); font-size: 0.7rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; background: white; color: var(--ink-light);
    font-family: 'DM Sans', sans-serif;
  }
  .toggle-btn.chad-active { background: var(--chad); border-color: var(--chad); color: white; }
  .toggle-btn.brie-active { background: var(--brie); border-color: var(--brie); color: white; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 0.75rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
  .btn-close { padding: 0.5rem 1.2rem; border-radius: 8px; border: 1.5px solid var(--border); background: none; color: var(--ink-light); font-size: 0.82rem; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-close:hover { border-color: var(--ink-light); color: var(--ink); }
  .btn-save { padding: 0.5rem 1.4rem; border-radius: 8px; border: none; background: var(--month-header); color: white; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
  .btn-save:hover { background: var(--chad); }

  @media (max-width: 768px) {
    header { padding: 1rem 1.2rem; }
    main { padding: 0.75rem 0.75rem 4rem; }
    .day-cell { min-height: 85px; padding: 0.3rem; }
    .workout-name-label { display: none; }
    .workout-pip { width: 11px; height: 11px; font-size: 0.4rem; }
    .stats-bar { padding: 0.75rem 1rem; gap: 0.75rem; }
  }
</style>
</head>
<body>

<!-- GATE -->
<div id="gate">
  <div class="gate-box">
    <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;color:var(--month-header);text-align:center;">Exercise Log</h2>
    <p style="text-align:center;font-size:0.8rem;color:var(--ink-light);">Chad &amp; Brie · Enter password</p>
    <input class="gate-input" type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="gate-btn" onclick="checkPw()">Enter</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">
  <header>
    <div class="title-block">
      <h1>Exercise Log</h1>
      <p>Chad &amp; Brie · 2026</p>
    </div>
    <div class="header-right">
      <div class="legend">
        <div class="legend-item"><div class="legend-dot dot-chad"></div>Chad</div>
        <div class="legend-item"><div class="legend-dot dot-brie"></div>Brie</div>
        <div class="legend-item"><div class="legend-dot dot-both"></div>Both</div>
      </div>
      <div class="view-switcher">
        <button class="view-btn active" id="btnMonth" onclick="setView('month')">Month</button>
        <button class="view-btn" id="btnWeek" onclick="setView('week')">Week</button>
      </div>
      <div class="sync-label">
        <span class="sync-dot" id="syncDot"></span>
        <span id="syncText">connecting…</span>
      </div>
      <div class="nav">
        <button class="nav-btn" onclick="navPrev()">←</button>
        <div class="nav-label" id="navLabel"></div>
        <button class="nav-btn" onclick="navNext()">→</button>
      </div>
    </div>
  </header>

  <main>
    <!-- MONTH VIEW -->
    <div id="monthView">
      <div class="calendar-grid">
        <div class="dow-row">
          <div class="dow-cell">Sun</div><div class="dow-cell">Mon</div>
          <div class="dow-cell">Tue</div><div class="dow-cell">Wed</div>
          <div class="dow-cell">Thu</div><div class="dow-cell">Fri</div>
          <div class="dow-cell">Sat</div>
        </div>
        <div id="calBody"></div>
      </div>
    </div>

    <!-- WEEK VIEW -->
    <div id="weekView">
      <div class="week-view-grid">
        <div class="week-view-header" id="weekHeader"></div>
        <div id="weekBody"></div>
      </div>
    </div>
  </main>

  <div class="stats-bar" id="statsBar"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-workouts" id="modalWorkouts"></div>
    <div class="modal-actions">
      <button class="btn-close" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveModal()">Save</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAv89ee9PBlFvhqJbZ31SfZeIIBdKXOUyk",
  authDomain: "b-c-exercise-log.firebaseapp.com",
  projectId: "b-c-exercise-log",
  storageBucket: "b-c-exercise-log.firebasestorage.app",
  messagingSenderId: "208888588686",
  appId: "1:208888588686:web:d01cacbf448f1b093d9cdf"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);

const PASSWORD = "chadandbrie2026";
const WORKOUTS = ['GYM','MEDITATE','JOG','STRETCH','BIKE','UPPER BODY','LOWER BODY','DOG WALK'];
const FIRST    = {GYM:'G',MEDITATE:'M',JOG:'J',STRETCH:'S',BIKE:'B','UPPER BODY':'U','LOWER BODY':'L','DOG WALK':'DW'};

const today     = new Date();
let viewYear    = today.getFullYear();
let viewMonth   = today.getMonth();
let weekOffset  = 0; // weeks from current week
let currentView = 'month';
let cache       = {};

// ── GATE ─────────────────────────────────────────────────
window.checkPw = () => {
  const val = document.getElementById('pwInput').value.trim();
  if (val === PASSWORD) {
    document.getElementById('gate').style.display = 'none';
    document.getElementById('app').style.display  = 'block';
    startFirestore();
  } else {
    document.getElementById('gateError').textContent = 'Incorrect password.';
    document.getElementById('pwInput').value = '';
  }
};

// ── SYNC ─────────────────────────────────────────────────
function setSyncState(state) {
  const dot  = document.getElementById('syncDot');
  const text = document.getElementById('syncText');
  dot.className = 'sync-dot ' + state;
  text.textContent = state==='syncing'?'saving…':state==='synced'?'synced ✓':state==='error'?'sync error':'connecting…';
}

function startFirestore() {
  const ref = doc(db, 'logs', 'shared');
  onSnapshot(ref, snap => {
    cache = snap.exists() ? (snap.data().days || {}) : {};
    setSyncState('synced');
    render();
  }, () => setSyncState('error'));
}

async function saveToFirestore() {
  setSyncState('syncing');
  try {
    await setDoc(doc(db,'logs','shared'), {days: cache}, {merge: true});
    setSyncState('synced');
  } catch(e) { setSyncState('error'); }
}

// ── HELPERS ───────────────────────────────────────────────
function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function isToday(y,m,d) { return y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate(); }
function getDayData(key) {
  if (!cache[key]) cache[key]={};
  WORKOUTS.forEach(w=>{if(!cache[key][w])cache[key][w]={chad:false,brie:false};});
  return cache[key];
}
function dayShade(dayData) {
  let c=false,b=false;
  WORKOUTS.forEach(w=>{if(dayData[w]?.chad)c=true;if(dayData[w]?.brie)b=true;});
  return c&&b?'shade-both':c?'shade-chad':b?'shade-brie':'';
}

// ── VIEW SWITCHING ────────────────────────────────────────
window.setView = (v) => {
  currentView = v;
  document.getElementById('monthView').style.display = v==='month'?'block':'none';
  document.getElementById('weekView').style.display  = v==='week'?'block':'none';
  document.getElementById('btnMonth').classList.toggle('active', v==='month');
  document.getElementById('btnWeek').classList.toggle('active',  v==='week');
  if (v==='week') weekOffset=0;
  render();
};

window.navPrev = () => { if(currentView==='month'){viewMonth--;if(viewMonth<0){viewMonth=11;viewYear--;}}else weekOffset--; render(); };
window.navNext = () => { if(currentView==='month'){viewMonth++;if(viewMonth>11){viewMonth=0;viewYear++;}}else weekOffset++; render(); };

function render() {
  if(currentView==='month') renderMonth();
  else renderWeek();
  renderStats();
}

// ── MONTH VIEW ────────────────────────────────────────────
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function renderMonth() {
  document.getElementById('navLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
  const firstDay    = new Date(viewYear,viewMonth,1).getDay();
  const daysInMonth = new Date(viewYear,viewMonth+1,0).getDate();
  const daysInPrev  = new Date(viewYear,viewMonth,0).getDate();

  let cells=[];
  for(let i=firstDay-1;i>=0;i--) cells.push({day:daysInPrev-i,month:viewMonth-1,year:viewYear,faded:true});
  for(let d=1;d<=daysInMonth;d++) cells.push({day:d,month:viewMonth,year:viewYear,faded:false});
  const rem=7-(cells.length%7); if(rem<7) for(let d=1;d<=rem;d++) cells.push({day:d,month:viewMonth+1,year:viewYear,faded:true});

  const body=document.getElementById('calBody'); body.innerHTML='';
  for(let w=0;w<cells.length/7;w++){
    const weekEl=document.createElement('div'); weekEl.className='week-row';
    for(let wd=0;wd<7;wd++){
      const cell=cells[w*7+wd];
      const key=dateKey(cell.year,cell.month,cell.day);
      const dayData=cache[key]||{};
      const shade=cell.faded?'':dayShade(dayData);
      const todayCls=(!cell.faded&&isToday(cell.year,cell.month,cell.day))?'today':'';
      const wkndCls=(wd===0||wd===6)?'weekend':'';
      const cellEl=document.createElement('div');
      cellEl.className=['day-cell',wkndCls,todayCls,shade,cell.faded?'other-month':''].filter(Boolean).join(' ');
      if(!cell.faded) cellEl.onclick=()=>openModal(cell.year,cell.month,cell.day);

      let html=`<div class="day-num">${cell.day}</div><div class="workouts-grid">`;
      WORKOUTS.forEach(wo=>{
        const wd2=dayData[wo]||{chad:false,brie:false};
        html+=`<div class="workout-row">
          <div class="workout-name-label">${wo}</div>
          <div class="workout-pip${wd2.chad?' chad-done':''}" data-tooltip="Chad – ${wo}">${FIRST[wo]}</div>
          <div class="workout-pip${wd2.brie?' brie-done':''}" data-tooltip="Brie – ${wo}">${FIRST[wo]}</div>
        </div>`;
      });
      html+='</div>';
      cellEl.innerHTML=html;
      weekEl.appendChild(cellEl);
    }
    body.appendChild(weekEl);
  }
}

// ── WEEK VIEW ─────────────────────────────────────────────
function getWeekDates() {
  const now = new Date();
  const dayOfWeek = now.getDay(); // 0=Sun
  const sunday = new Date(now);
  sunday.setDate(now.getDate() - dayOfWeek + (weekOffset * 7));
  const days=[];
  for(let i=0;i<7;i++){
    const d=new Date(sunday); d.setDate(sunday.getDate()+i);
    days.push(d);
  }
  return days;
}

const DOW_SHORT=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function renderWeek() {
  const days=getWeekDates();
  const start=days[0], end=days[6];
  const startStr=`${MONTHS[start.getMonth()].slice(0,3)} ${start.getDate()}`;
  const endStr  =`${MONTHS[end.getMonth()].slice(0,3)} ${end.getDate()}`;
  document.getElementById('navLabel').textContent=`${startStr} – ${endStr}`;

  // Header
  const hdr=document.getElementById('weekHeader'); hdr.innerHTML='';
  const emptyHdr=document.createElement('div'); emptyHdr.className='week-view-header-cell'; emptyHdr.textContent=''; hdr.appendChild(emptyHdr);
  days.forEach(d=>{
    const cell=document.createElement('div');
    const todayCls=isToday(d.getFullYear(),d.getMonth(),d.getDate())?'today-col':'';
    cell.className=`week-view-header-cell ${todayCls}`;
    cell.innerHTML=`<div>${DOW_SHORT[d.getDay()]}</div><div style="font-size:1rem;font-family:'Playfair Display',serif;margin-top:2px;">${d.getDate()}</div>`;
    hdr.appendChild(cell);
  });

  // Rows per workout
  const body=document.getElementById('weekBody'); body.innerHTML='';
  WORKOUTS.forEach(wo=>{
    const row=document.createElement('div'); row.className='week-view-row';
    const label=document.createElement('div'); label.className='week-workout-label'; label.textContent=wo;
    row.appendChild(label);
    days.forEach(d=>{
      const key=dateKey(d.getFullYear(),d.getMonth(),d.getDate());
      const dayData=cache[key]||{};
      const wd2=dayData[wo]||{chad:false,brie:false};
      const todayCls=isToday(d.getFullYear(),d.getMonth(),d.getDate())?'today-col':'';
      const cell=document.createElement('div');
      cell.className=`week-day-cell ${todayCls}`;
      cell.onclick=()=>openModal(d.getFullYear(),d.getMonth(),d.getDate());
      cell.innerHTML=`
        <div class="week-pip${wd2.chad?' chad-done':''}" data-tooltip="Chad">${FIRST[wo]}</div>
        <div class="week-pip-label">Chad</div>
        <div class="week-pip${wd2.brie?' brie-done':''}" data-tooltip="Brie" style="margin-top:3px;">${FIRST[wo]}</div>
        <div class="week-pip-label">Brie</div>`;
      row.appendChild(cell);
    });
    body.appendChild(row);
  });
}

// ── STATS ─────────────────────────────────────────────────
function renderStats() {
  let dates=[];
  if(currentView==='month'){
    const days=new Date(viewYear,viewMonth+1,0).getDate();
    for(let d=1;d<=days;d++) dates.push(dateKey(viewYear,viewMonth,d));
  } else {
    getWeekDates().forEach(d=>dates.push(dateKey(d.getFullYear(),d.getMonth(),d.getDate())));
  }
  let cT=0,bT=0; const wC={};
  WORKOUTS.forEach(w=>wC[w]={chad:0,brie:0});
  dates.forEach(key=>{
    const dd=cache[key]||{};
    WORKOUTS.forEach(w=>{
      if(dd[w]?.chad){cT++;wC[w].chad++;}
      if(dd[w]?.brie){bT++;wC[w].brie++;}
    });
  });
  const period=currentView==='month'?'this month':'this week';
  document.getElementById('statsBar').innerHTML=`
    <div class="stat-block"><div class="stat-val chad-color">${cT}</div><div class="stat-label">Chad ${period}</div></div>
    <div class="stat-divider"></div>
    <div class="stat-block"><div class="stat-val brie-color">${bT}</div><div class="stat-label">Brie ${period}</div></div>
    <div class="stat-divider"></div>
    ${WORKOUTS.map(w=>`
      <div class="stat-block">
        <div style="display:flex;gap:5px;justify-content:center;align-items:baseline;">
          <span class="stat-val chad-color" style="font-size:0.95rem;">${wC[w].chad}</span>
          <span style="font-size:0.6rem;color:var(--ink-faint);">/</span>
          <span class="stat-val brie-color" style="font-size:0.95rem;">${wC[w].brie}</span>
        </div>
        <div class="stat-label">${w}</div>
      </div>
    `).join('<div class="stat-divider"></div>')}
  `;
}

// ── MODAL ─────────────────────────────────────────────────
let modalKey=null, modalState={};
const DOW_FULL=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MON_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

window.openModal = (y,m,d) => {
  modalKey=dateKey(y,m,d);
  const dayData=getDayData(modalKey);
  modalState=JSON.parse(JSON.stringify(dayData));
  const dt=new Date(y,m,d);
  document.getElementById('modalDate').textContent=`${DOW_FULL[dt.getDay()]}, ${MON_SHORT[m]} ${d}`;
  document.getElementById('modalWorkouts').innerHTML=WORKOUTS.map(w=>`
    <div class="modal-workout-row">
      <div class="modal-workout-name">${w}</div>
      <div class="modal-toggles">
        <button class="toggle-btn ${modalState[w]?.chad?'chad-active':''}" onclick="toggleModal('${w}','chad',this)">Chad</button>
        <button class="toggle-btn ${modalState[w]?.brie?'brie-active':''}" onclick="toggleModal('${w}','brie',this)">Brie</button>
      </div>
    </div>`).join('');
  document.getElementById('modalOverlay').classList.add('open');
};

window.toggleModal=(wo,person,btn)=>{
  modalState[wo][person]=!modalState[wo][person];
  btn.classList.toggle(person==='chad'?'chad-active':'brie-active',modalState[wo][person]);
};

window.saveModal=async()=>{
  cache[modalKey]=modalState;
  closeModal(); render();
  await saveToFirestore();
};

window.closeModal=()=>{ document.getElementById('modalOverlay').classList.remove('open'); modalKey=null; };
window.handleOverlayClick=(e)=>{ if(e.target===document.getElementById('modalOverlay'))closeModal(); };
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
</script>
</body>
